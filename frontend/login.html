<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso - Rastreo Vehicular</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h1>Ingreso</h1>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="dashboard.html">Dashboard</a>
        </nav>
    </header>

    <main>
        <form id="login-form">
            <label for="username">Usuario</label>
            <input id="username" name="username" type="text" autocomplete="username" required>

            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>

            <button id="login-button" type="submit">Ingresar</button>
            <p class="message" id="login-message" aria-live="polite"></p>
            <p><a href="register_company.html">Crear una empresa nueva</a></p>
        </form>
    </main>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        const loginForm = document.getElementById("login-form");
        const usernameInput = document.getElementById("username");
        const passwordInput = document.getElementById("password");
        const loginButton = document.getElementById("login-button");
        const loginMessage = document.getElementById("login-message");

        function setLoginMessage(text, isError = false) {
            loginMessage.textContent = text;
            loginMessage.classList.toggle("error", isError);
        }

        if (window.RastreoAuth.getToken()) {
            window.RastreoAuth.loadCurrentUser()
                .then(() => {
                    window.location.href = window.RastreoAuth.getRedirectAfterLogin();
                })
                .catch(() => {
                    window.RastreoAuth.clearSession();
                });
        }

        loginForm.addEventListener("submit", async (event) => {
            event.preventDefault();

            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            if (!username || !password) {
                setLoginMessage("Ingresa usuario y password.", true);
                return;
            }

            loginButton.disabled = true;
            setLoginMessage("Ingresando...");

            try {
                await window.RastreoAuth.login(username, password);
                window.location.href = window.RastreoAuth.getRedirectAfterLogin();
            } catch (error) {
                setLoginMessage("Usuario o password incorrectos.", true);
            } finally {
                loginButton.disabled = false;
            }
        });
    </script>
</body>
</html>

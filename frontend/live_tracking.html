<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seguimiento en vivo - Rastreo Vehicular</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f7f9;
            color: #1f2933;
        }

        main {
            width: min(100%, 560px);
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            margin: 0 0 18px;
            font-size: 28px;
            line-height: 1.2;
        }

        .session-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin: 0 0 18px;
            color: #3c4856;
            font-size: 14px;
        }

        .session-user {
            font-weight: bold;
        }

        #logout-button {
            width: auto;
            padding: 8px 12px;
            font-size: 14px;
            background: #3c4856;
        }

        .field {
            display: grid;
            gap: 8px;
            margin-bottom: 16px;
        }

        label {
            font-weight: bold;
        }

        input,
        select {
            width: 100%;
            border: 1px solid #c5ccd3;
            border-radius: 6px;
            padding: 14px;
            font-size: 18px;
            background: #ffffff;
            color: #1f2933;
        }

        .actions {
            display: grid;
            gap: 12px;
            margin: 20px 0;
        }

        button {
            width: 100%;
            border: 0;
            border-radius: 6px;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            cursor: pointer;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.65;
        }

        #start-button {
            background: #1d7a8c;
        }

        #stop-button {
            background: #b42318;
        }

        .status {
            border: 1px solid #d7dde3;
            border-radius: 8px;
            padding: 16px;
            background: #ffffff;
            line-height: 1.55;
        }

        .status-message {
            margin: 0 0 14px;
            font-weight: bold;
            color: #3c4856;
        }

        .status-message.error {
            color: #b42318;
        }

        .status-message.success {
            color: #16794c;
        }

        .data-list {
            display: grid;
            gap: 8px;
            margin: 0;
        }

        .data-row {
            display: grid;
            grid-template-columns: 150px 1fr;
            gap: 8px;
        }

        .data-label {
            font-weight: bold;
        }

        .data-value {
            overflow-wrap: anywhere;
        }

        @media (max-width: 420px) {
            main {
                padding: 16px;
            }

            h1 {
                font-size: 24px;
            }

            .data-row {
                grid-template-columns: 1fr;
                gap: 2px;
            }
        }
    </style>
</head>
<body>
    <main>
        <h1>Seguimiento en vivo</h1>
        <div class="session-bar" aria-live="polite">
            <span>Sesion: <span class="session-user" id="session-user">Cargando...</span></span>
            <button id="logout-button" type="button">Salir</button>
        </div>

        <form id="tracking-form">
            <div class="field">
                <label for="vehicle-id">Vehicle ID</label>
                <input id="vehicle-id" name="vehicle-id" type="number" min="1" inputmode="numeric" required>
            </div>

            <div class="field">
                <label for="category">Categor&iacute;a</label>
                <select id="category" name="category" required>
                    <option value="">Seleccionar categor&iacute;a</option>
                    <option value="trabajo">trabajo</option>
                    <option value="obligaciones familiares">obligaciones familiares</option>
                    <option value="ocio">ocio</option>
                </select>
            </div>

            <div class="actions">
                <button id="start-button" type="submit">Iniciar seguimiento</button>
                <button id="stop-button" type="button" disabled>Detener seguimiento</button>
            </div>
        </form>

        <section class="status" aria-live="polite">
            <p class="status-message" id="status-message">Sin seguimiento activo.</p>
            <dl class="data-list">
                <div class="data-row">
                    <dt class="data-label">Estado</dt>
                    <dd class="data-value" id="tracking-status">Detenido</dd>
                </div>
                <div class="data-row">
                    <dt class="data-label">Trip ID</dt>
                    <dd class="data-value" id="current-trip-id">Sin dato</dd>
                </div>
                <div class="data-row">
                    <dt class="data-label">Latitud</dt>
                    <dd class="data-value" id="last-latitude">Sin dato</dd>
                </div>
                <div class="data-row">
                    <dt class="data-label">Longitud</dt>
                    <dd class="data-value" id="last-longitude">Sin dato</dd>
                </div>
                <div class="data-row">
                    <dt class="data-label">Precisi&oacute;n</dt>
                    <dd class="data-value" id="last-accuracy">Sin dato</dd>
                </div>
                <div class="data-row">
                    <dt class="data-label">Velocidad</dt>
                    <dd class="data-value" id="last-speed">Sin dato</dd>
                </div>
            </dl>
        </section>
    </main>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const apiBaseUrl = window.RastreoConfig?.apiBaseUrl || window.location.origin;
        const auth = window.RastreoAuth;

        const trackingForm = document.getElementById("tracking-form");
        const vehicleIdInput = document.getElementById("vehicle-id");
        const categorySelect = document.getElementById("category");
        const startButton = document.getElementById("start-button");
        const stopButton = document.getElementById("stop-button");
        const statusMessage = document.getElementById("status-message");
        const trackingStatus = document.getElementById("tracking-status");
        const currentTripId = document.getElementById("current-trip-id");
        const lastLatitude = document.getElementById("last-latitude");
        const lastLongitude = document.getElementById("last-longitude");
        const lastAccuracy = document.getElementById("last-accuracy");
        const lastSpeed = document.getElementById("last-speed");
        const sessionUser = document.getElementById("session-user");
        const logoutButton = document.getElementById("logout-button");

        const maxAllowedAccuracyMeters = 20;
        const minSecondsBetweenPoints = 5;
        const minDistanceBetweenPointsMeters = 5;
        const geolocationErrorCodes = {
            permissionDenied: 1,
            positionUnavailable: 2,
            timeout: 3
        };

        let tripId = null;
        let watchId = null;
        let isTracking = false;
        let lastSentPoint = null;
        let lastSentAt = null;
        let currentUser = null;

        function userHasPermission(permissionName) {
            return Boolean(currentUser && currentUser.permissions && currentUser.permissions[permissionName]);
        }

        function applyUserContext(user) {
            currentUser = user;
            sessionUser.textContent = `${user.full_name || user.username} (${user.role})`;

            if (!userHasPermission("view_all_vehicles") && Array.isArray(user.vehicle_ids) && user.vehicle_ids.length === 1) {
                vehicleIdInput.value = user.vehicle_ids[0];
            }
        }

        function setMessage(text, type = "normal") {
            statusMessage.textContent = text;
            statusMessage.classList.toggle("error", type === "error");
            statusMessage.classList.toggle("success", type === "success");
        }

        function formatValue(value, suffix = "") {
            if (value === null || value === undefined || value === "") {
                return "Sin dato";
            }

            return `${value}${suffix}`;
        }

        function updateControls() {
            const canEditTrips = userHasPermission("edit_trips");
            startButton.disabled = !canEditTrips || isTracking;
            stopButton.disabled = !canEditTrips || (!isTracking && !tripId);
            vehicleIdInput.disabled = !canEditTrips || isTracking;
            categorySelect.disabled = !canEditTrips || isTracking;
            trackingStatus.textContent = isTracking ? "Siguiendo" : "Detenido";
            currentTripId.textContent = formatValue(tripId);
        }

        function getJsonHeaders() {
            return {
                "Content-Type": "application/json"
            };
        }

        async function postJson(url, body) {
            const response = await auth.authFetch(url, {
                method: "POST",
                headers: getJsonHeaders(),
                body: JSON.stringify(body)
            });

            if (!response.ok) {
                throw new Error(`Error ${response.status}`);
            }

            return response.json();
        }

        function calculateDistanceMeters(firstPoint, secondPoint) {
            const earthRadiusMeters = 6371000;
            const degreesToRadians = Math.PI / 180;
            const firstLatitude = firstPoint.latitude * degreesToRadians;
            const secondLatitude = secondPoint.latitude * degreesToRadians;
            const deltaLatitude = (secondPoint.latitude - firstPoint.latitude) * degreesToRadians;
            const deltaLongitude = (secondPoint.longitude - firstPoint.longitude) * degreesToRadians;

            const a = Math.sin(deltaLatitude / 2) * Math.sin(deltaLatitude / 2)
                + Math.cos(firstLatitude) * Math.cos(secondLatitude)
                * Math.sin(deltaLongitude / 2) * Math.sin(deltaLongitude / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

            return earthRadiusMeters * c;
        }

        function updatePositionDisplay(point) {
            const { latitude, longitude, accuracy, speed } = point;

            lastLatitude.textContent = formatValue(latitude);
            lastLongitude.textContent = formatValue(longitude);
            lastAccuracy.textContent = formatValue(accuracy, " m");
            lastSpeed.textContent = formatValue(speed, " m/s");
        }

        async function sendPoint(position) {
            if (!tripId) {
                return;
            }

            const coords = position.coords;
            const pointBody = {
                latitude: coords.latitude,
                longitude: coords.longitude,
                timestamp: new Date().toISOString(),
                accuracy: coords.accuracy ?? null,
                speed: coords.speed ?? null
            };

            updatePositionDisplay(pointBody);

            if (pointBody.accuracy === null || pointBody.accuracy > maxAllowedAccuracyMeters) {
                setMessage(`Punto descartado por precision (${formatValue(pointBody.accuracy, " m")}).`, "error");
                return;
            }

            const now = Date.now();

            if (lastSentAt !== null) {
                const secondsSinceLastPoint = (now - lastSentAt) / 1000;

                if (secondsSinceLastPoint < minSecondsBetweenPoints) {
                    setMessage(`Punto descartado por tiempo minimo (${secondsSinceLastPoint.toFixed(1)} s).`, "error");
                    return;
                }
            }

            if (lastSentPoint !== null) {
                const distanceMeters = calculateDistanceMeters(lastSentPoint, pointBody);

                if (distanceMeters < minDistanceBetweenPointsMeters) {
                    setMessage(`Punto descartado por distancia minima (${distanceMeters.toFixed(1)} m).`, "error");
                    return;
                }
            }

            try {
                await postJson(`${apiBaseUrl}/trips/${tripId}/points`, pointBody);
                lastSentPoint = pointBody;
                lastSentAt = now;
                setMessage("Seguimiento activo. Ultimo punto enviado correctamente.", "success");
            } catch (error) {
                setMessage("No se pudo enviar el punto al backend. Revisa la conexion y que el backend este corriendo.", "error");
            }
        }

        async function handleGeolocationError(error) {
            if (error.code === geolocationErrorCodes.permissionDenied) {
                const errorMessage = "Permiso de ubicacion denegado. Activa la ubicacion del navegador para continuar.";
                const tripIdToStop = tripId;

                setMessage(errorMessage, "error");

                if (watchId !== null) {
                    navigator.geolocation.clearWatch(watchId);
                    watchId = null;
                }

                isTracking = false;
                lastSentPoint = null;
                lastSentAt = null;
                updateControls();

                if (!tripIdToStop) {
                    return;
                }

                try {
                    await postJson(`${apiBaseUrl}/trips/${tripIdToStop}/stop`, {});
                    tripId = null;
                    updateControls();
                    setMessage(`${errorMessage} Recorrido ${tripIdToStop} cerrado automaticamente.`, "error");
                } catch (stopError) {
                    tripId = null;
                    updateControls();
                    setMessage(`${errorMessage} No se pudo cerrar automaticamente el recorrido ${tripIdToStop}.`, "error");
                }

                return;
            }

            if (error.code === geolocationErrorCodes.positionUnavailable) {
                setMessage("Posicion GPS no disponible por el momento. El seguimiento sigue activo y se reintentara automaticamente.", "error");
                return;
            }

            if (error.code === geolocationErrorCodes.timeout) {
                setMessage("Timeout obteniendo GPS. El seguimiento sigue activo y se reintentara automaticamente.", "error");
                return;
            }

            setMessage("Error de ubicacion desconocido. El seguimiento sigue activo y se reintentara automaticamente.", "error");
        }

        async function startTracking() {
            if (!userHasPermission("edit_trips")) {
                setMessage("No tienes permiso para iniciar seguimiento.", "error");
                return;
            }

            const vehicleId = vehicleIdInput.value.trim();
            const categoria = categorySelect.value;

            if (!vehicleId) {
                setMessage("Ingresa un vehicle_id antes de iniciar.", "error");
                return;
            }

            if (!categoria) {
                setMessage("Selecciona una categoria antes de iniciar.", "error");
                return;
            }

            if (!navigator.geolocation) {
                setMessage("Este navegador no soporta geolocalizacion.", "error");
                return;
            }

            startButton.disabled = true;
            setMessage("Iniciando recorrido...");

            try {
                const trip = await postJson(`${apiBaseUrl}/trips/start`, {
                    vehicle_id: Number(vehicleId),
                    categoria
                });

                tripId = trip.id;
                isTracking = true;
                lastSentPoint = null;
                lastSentAt = null;
                updateControls();
                setMessage("Recorrido iniciado. Esperando la primera posicion GPS...", "success");

                watchId = navigator.geolocation.watchPosition(
                    sendPoint,
                    handleGeolocationError,
                    {
                        enableHighAccuracy: true,
                        maximumAge: 0,
                        timeout: 15000
                    }
                );
            } catch (error) {
                tripId = null;
                isTracking = false;
                updateControls();
                setMessage("No se pudo iniciar el recorrido. Revisa la conexion con el backend.", "error");
            }
        }

        async function stopTracking() {
            if (!userHasPermission("edit_trips")) {
                setMessage("No tienes permiso para detener seguimiento.", "error");
                return;
            }

            const tripIdToStop = tripId;

            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }

            isTracking = false;
            lastSentPoint = null;
            lastSentAt = null;
            updateControls();

            if (!tripIdToStop) {
                setMessage("No hay un recorrido activo para detener.");
                return;
            }

            stopButton.disabled = true;
            setMessage("Deteniendo recorrido...");

            try {
                await postJson(`${apiBaseUrl}/trips/${tripIdToStop}/stop`, {});
                tripId = null;
                updateControls();
                setMessage(`Recorrido ${tripIdToStop} detenido correctamente.`, "success");
            } catch (error) {
                tripId = tripIdToStop;
                updateControls();
                setMessage("Se detuvo el GPS, pero no se pudo cerrar el recorrido en el backend.", "error");
            }
        }

        trackingForm.addEventListener("submit", (event) => {
            event.preventDefault();
            startTracking();
        });

        stopButton.addEventListener("click", () => {
            stopTracking();
        });

        logoutButton.addEventListener("click", () => {
            auth.logout();
        });

        async function bootstrapTracking() {
            const user = await auth.requireAuth();
            if (!user) {
                return;
            }

            applyUserContext(user);
            updateControls();
            if (!userHasPermission("edit_trips")) {
                setMessage("Tu usuario puede consultar recorridos, pero no iniciar seguimiento.", "error");
            }
        }

        bootstrapTracking();
    </script>
</body>
</html>
